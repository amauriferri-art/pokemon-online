<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeLife - O Mundo te Aguarda</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-overlay"></div>

    <div class="login-container">
        <div class="logo-box">
            <div class="pokeball-logo"></div>
            <h1>Poke<span>Life</span></h1>
            <p>Sua jornada começa aqui.</p>
        </div>

        <form id="auth-form">
            <h2 id="form-title">Login</h2>
            
            <div class="input-group">
                <label for="username">Nome de Treinador</label>
                <input type="text" id="username" placeholder="Ex: Ash Ketchum" required>
            </div>

            <div class="input-group">
                <label for="password">Senha Secreta</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-primary" id="submit-btn">Entrar no Mundo</button>
            
            <p class="toggle-text">Novo por aqui? <a href="#" id="toggle-link">Criar Conta</a></p>
        </form>
    </div>

    <script>
        const toggleLink = document.getElementById('toggle-link');
        const formTitle = document.getElementById('form-title');
        const submitBtn = document.getElementById('submit-btn');
        let isLogin = true;

        toggleLink.addEventListener('click', (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            if (isLogin) {
                formTitle.innerText = "Login";
                submitBtn.innerText = "Entrar no Mundo";
                toggleLink.innerHTML = "Criar Conta";
                toggleLink.previousSibling.textContent = "Novo por aqui? ";
            } else {
                formTitle.innerText = "Registro";
                submitBtn.innerText = "Criar Treinador";
                toggleLink.innerHTML = "Fazer Login";
                toggleLink.previousSibling.textContent = "Já tem uma conta? ";
            }
        });
    </script>
</body>
</html>
